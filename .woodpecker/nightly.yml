steps:
  build:
    image: rust:latest
    commands:
      - apt-get update && apt-get install -y mingw-w64 zip
      - rustup toolchain install nightly
      - rustup default nightly
      - rustup target add x86_64-pc-windows-gnu
      - cargo check
      - cargo build --release
      - cargo build --release --target x86_64-pc-windows-gnu
      - zip -j ferrowl-windows.zip target/x86_64-pc-windows-gnu/release/ferrowl.exe
      - tar -C target/release -cvf ferrowl-unix.tar.gz ferrowl
    when:
      - event: tag
        ref: refs/tags/nightly

  upload:
    image: woodpeckerci/plugin-release
    settings:
      api_key:
        from_secret: github_token
      files: 
        - ferrowl-unix.tar.gz
        - ferrowl-windows.zip
      title: 'Nightly'
      checksum:
        - sha256
        - md5
    when:
      - event: tag
        ref: refs/tags/nightly
