on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  release:
    name: release ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-pc-windows-gnu, x86_64-unknown-linux-musl]
    steps:
      - uses: actions/checkout@master
      - name: Compile and release
        uses: rust-build/rust-build.action@v1.4.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # The repo root is a virtual workspace manifest; point the action at the
          # actual binary package so `cargo read-manifest` resolves a target.
          SRC_DIR: "ferrowl"
          RUSTTARGET: ${{ matrix.target }}
          EXTRA_FILES: "README.md LICENSE"
          # The crate relies on nightly features (async_fn_traits, let_chains); also pinned
          # by rust-toolchain.toml.
          TOOLCHAIN_VERSION: nightly
