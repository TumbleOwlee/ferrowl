# General Ferrowl app config. Discovery order: ./config.toml,
# ~/.config/ferrowl/config.toml, or --config <file>.

# Lines kept in each module's on-screen log ring.
history_length = 80

# Default modbus timing applied to every module.
timeout_ms = 3000
delay_ms = 1000
interval_ms = 1000

# Base path for per-module log files (tab name appended). Uncomment to enable.
# log_file = "ferrowl.log"
